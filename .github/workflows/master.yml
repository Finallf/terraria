name: Project Automation & CI/CD

on:
  push:
    branches:
      - master

# Resolves Node.js version 24 warnings for the entire workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Update the Contributors in the README
  contrib-readme-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image_size: 80
          use_username: true
          collaborators: all

  # JOB 2: Analyzes Commits and Generates the Release
  release:
    needs: contrib-readme-job
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 3: Docker Build and Push (Only runs if there is a new version or push to the master branch)
  docker-sync:
    needs: release
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial permission for GitHub Packages
    steps:
      # Added "ref: master" to ensure it pulls the already updated README from JOB 1.
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: master

      # Log in to Docker Hub (Using your Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Log in to GitHub Container Registry (Automatic, no manual secret required)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push to BOTH repositories simultaneously.
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Here we manually force 'finallf' to lowercase to avoid errors.
          # If there's a newer version, use that one. If not, just use the latest version.
          tags: |
            finallf/terraria:latest
            ${{ needs.release.outputs.new_release_published == 'true' && format('finallf/terraria:{0}', needs.release.outputs.new_release_version) || '' }}
            ghcr.io/finallf/terraria:latest
            ${{ needs.release.outputs.new_release_published == 'true' && format('ghcr.io/finallf/terraria:{0}', needs.release.outputs.new_release_version) || '' }}

      # Send the README.md file to Docker Hub.
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: finallf/terraria
          readme-filepath: ./README.md