name: Project Automation & CI/CD

on:
  push:
    branches:
      - master

# Resolves Node.js version 24 warnings for the entire workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Update the Contributors in the README
  contrib-readme-job:
    runs-on: ubuntu-latest
    name: Automate contrib in readme
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Contribute List
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image_size: 80
          use_username: true
          collaborators: all

  # JOB 2: Build the image and sync it with Docker Hub + GitHub Packages.
  docker-sync:
    needs: contrib-readme-job
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial permission for GitHub Packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub (Using your Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Log in to GitHub Container Registry (Automatic, no manual secret required)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push to BOTH repositories simultaneously.
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Here we manually force 'finallf' to lowercase to avoid errors.
          tags: |
            finallf/terraria:latest
            finallf/terraria:${{ github.sha }}
            ghcr.io/finallf/terraria:latest
            ghcr.io/finallf/terraria:${{ github.sha }}

      # Update the description on Docker Hub.
      - name: Update Docker Hub Description (README)
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: finallf/terraria
          readme-filepath: ./README.md